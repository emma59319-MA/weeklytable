<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>週評鑑統計表_色彩強化版</title>
    <style>
        body {
            font-family: 'Microsoft JhengHei', sans-serif;
            background-color: #f4f7f4;
            padding: 20px;
            color: #333;
        }
        .container {
            max-width: 1450px;
            margin: 0 auto;
            background-color: #fff;
            padding: 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            border-radius: 8px;
        }
        h1 {
            text-align: center;
            color: #2e7d32;
            margin-bottom: 20px;
        }
        .week-input {
            text-align: center;
            margin-bottom: 30px;
            font-size: 1.1em;
        }
        .week-input input {
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
            width: 80px;
            text-align: center;
            font-size: 14pt;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 50px;
            table-layout: fixed;
        }
        th, td {
            border: 1px solid #a5d6a7;
            text-align: center;
            padding: 12px 8px;
            word-wrap: break-word;
        }
        /* 標題列：深綠色 */
        thead tr th {
            background-color: #2e7d32;
            color: white;
            font-weight: bold;
            font-size: 1.0em;
            height: 45px;
        }
        .name-header, .name-cell { width: 100px; }
        .plan-header, .plan-cell { width: 160px; font-weight: bold; }

        /* 輸入字型大小 */
        td[contenteditable="true"] { cursor: text; font-size: 14pt; }
        td[contenteditable="true"]:focus { background-color: #fffde7; outline: 2px solid #2e7d32; }

        /* 預計安排：白色背景，黑字 */
        .plan-row-expect { color: #333; background-color: #ffffff; }
        .plan-row-expect .plan-cell { background-color: #f1f8e9; color: #2e7d32; }

        /* 實際達成：非常淡的綠色背景，咖啡色字 */
        .plan-row-actual { color: #8B4513; background-color: #f9fdf9; }
        .plan-row-actual .plan-cell { background-color: #e8f5e9; }

        /* 差額：淡綠色背景，紅色字 */
        .plan-row-diff { color: #d32f2f; background-color: #dcedc8; font-weight: bold; }
        .plan-row-diff .plan-cell { background-color: #c8e6c9; }
        
        /* 差額欄位鎖定提示 */
        .plan-row-diff td:not(.plan-cell) { cursor: not-allowed; font-size: 14pt; }
    </style>
</head>
<body>

<div class="container">
    <h1>週評鑑統計表</h1>
    
    <div class="week-input">
        <input type="text" placeholder="____"> 月 第 <input type="text" placeholder="____"> 週
    </div>

    <div id="tables-wrapper"></div>

    <script>
        const wrapper = document.getElementById('tables-wrapper');
        
        for (let i = 1; i <= 10; i++) {
            const tableHTML = `
                <table>
                    <thead>
                        <tr>
                            <th class="name-header">姓名</th>
                            <th class="plan-header">計畫</th>
                            <th>參訓率<br>(8:30前)</th>
                            <th>問卷</th>
                            <th>拜訪量</th>
                            <th>FYC合計</th>
                            <th>FYP合計</th>
                            <th>建議書</th>
                            <th>轉介</th>
                            <th>增員人次</th>
                            <th>講座邀約</th>
                            <th>收入目標<br>(/月)</th>
                            <th>件數<br>(/月)</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr class="plan-row-expect">
                            <td class="name-cell" rowspan="3" contenteditable="true"></td>
                            <td class="plan-cell">預計安排</td>
                            ${'<td contenteditable="true" class="input-cell" oninput="calculateTable(this)"></td>'.repeat(11)}
                        </tr>
                        <tr class="plan-row-actual">
                            <td class="plan-cell">實際達成</td>
                            ${'<td contenteditable="true" class="input-cell" oninput="calculateTable(this)"></td>'.repeat(11)}
                        </tr>
                        <tr class="plan-row-diff">
                            <td class="plan-cell">差額</td>
                            ${'<td></td>'.repeat(11)}
                        </tr>
                    </tbody>
                </table>
            `;
            wrapper.insertAdjacentHTML('beforeend', tableHTML);
        }

        function calculateTable(cell) {
            const table = cell.closest('table');
            const expectRow = table.querySelector('.plan-row-expect');
            const actualRow = table.querySelector('.plan-row-actual');
            const diffRow = table.querySelector('.plan-row-diff');

            const expectInputs = Array.from(expectRow.querySelectorAll('.input-cell'));
            const actualInputs = Array.from(actualRow.querySelectorAll('.input-cell'));
            const diffOutputs = Array.from(diffRow.querySelectorAll('td:not(.plan-cell)'));

            expectInputs.forEach((input, index) => {
                let eText = input.innerText.trim();
                let aText = actualInputs[index].innerText.trim();
                
                let eVal = parseNum(eText);
                let aVal = parseNum(aText);

                if (!isNaN(eVal) || !isNaN(aVal)) {
                    let res = (eVal || 0) - (aVal || 0);
                    let suffix = (eText.includes('%') || aText.includes('%')) ? '%' : '';
                    diffOutputs[index].innerText = (eText === "" && aText === "") ? "" : res + suffix;
                } else {
                    diffOutputs[index].innerText = "";
                }
            });
        }

        function parseNum(str) {
            if (!str) return NaN;
            return parseFloat(str.replace(/[,%]/g, ''));
        }
    </script>
</div>

</body>
</html>
