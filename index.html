<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>週評鑑統計表_A4壓縮版</title>
    <style>
        /* 基礎設定：模擬 9:16 與 A4 直式視覺 */
        body {
            font-family: 'Microsoft JhengHei', sans-serif;
            background-color: #555;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
        }

        /* A4 紙張容器：固定比例與寬度 */
        .a4-page {
            width: 210mm;
            height: 297mm;
            padding: 10mm 8mm;
            background-color: #fff;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            overflow: hidden; /* 確保內容壓縮在頁面內 */
        }

        h1 {
            text-align: center;
            color: #2e7d32;
            margin: 0 0 5px 0;
            font-size: 18pt;
        }

        .week-info {
            text-align: center;
            margin-bottom: 10px;
            font-size: 12pt;
        }

        .week-info input {
            border: none;
            border-bottom: 1px solid #333;
            width: 40px;
            text-align: center;
            font-size: 14pt;
            outline: none;
        }

        /* 表格壓縮樣式 */
        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 6px; /* 壓縮人員間距 */
            table-layout: fixed;
        }

        th, td {
            border: 1px solid #2e7d32;
            text-align: center;
            padding: 3px 1px; /* 極致壓縮內距 */
            word-wrap: break-word;
            line-height: 1.1;
        }

        /* 標題列：深綠色 */
        thead th {
            background-color: #2e7d32;
            color: white;
            font-size: 9pt;
            height: 28px;
        }

        .name-header, .name-cell { width: 35px; }
        .plan-header, .plan-cell { width: 85px; font-weight: bold; font-size: 9pt; }

        /* 輸入區域字型 14pt */
        td[contenteditable="true"] {
            cursor: text;
            font-size: 14pt;
            outline: none;
        }

        /* 配色層次 */
        .row-expect { background-color: #ffffff; color: #333; }
        
        .row-actual { 
            background-color: #dcedc8; /* 加深的淡綠色 */
            color: #8B4513; /* 咖啡色文字 */
        }

        .row-diff { 
            background-color: #a5d6a7; /* 差額列最深綠 */
            color: #d32f2f; /* 紅色文字 */
            font-weight: bold;
        }

        /* 禁止編輯差額欄位 */
        .row-diff td:not(.plan-cell) { cursor: not-allowed; }

        @media print {
            body { background: none; }
            .a4-page { box-shadow: none; margin: 0; border: none; }
        }
    </style>
</head>
<body>

<div class="a4-page">
    <h1>週評鑑統計表</h1>
    
    <div class="week-info">
        <input type="text" placeholder="___"> 月 第 <input type="text" placeholder="___"> 週
    </div>

    <div id="main-content"></div>

    <script>
        const container = document.getElementById('main-content');
        
        // 精確生成 10 個壓縮區塊
        for (let i = 1; i <= 10; i++) {
            const tableHTML = `
                <table>
                    <thead>
                        <tr>
                            <th class="name-header">姓名</th>
                            <th class="plan-header">計畫</th>
                            <th>參訓率</th>
                            <th>問卷</th>
                            <th>拜訪</th>
                            <th>FYC</th>
                            <th>FYP</th>
                            <th>建議書</th>
                            <th>轉介</th>
                            <th>增員</th>
                            <th>講座</th>
                            <th>目標</th>
                            <th>件數</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr class="row-expect">
                            <td class="name-cell" rowspan="3" contenteditable="true"></td>
                            <td class="plan-cell">預計安排</td>
                            ${'<td contenteditable="true" class="in-cell" oninput="run(this)"></td>'.repeat(11)}
                        </tr>
                        <tr class="row-actual">
                            <td class="plan-cell">實際達成</td>
                            ${'<td contenteditable="true" class="in-cell" oninput="run(this)"></td>'.repeat(11)}
                        </tr>
                        <tr class="row-diff">
                            <td class="plan-cell">差額</td>
                            ${'<td></td>'.repeat(11)}
                        </tr>
                    </tbody>
                </table>
            `;
            container.insertAdjacentHTML('beforeend', tableHTML);
        }

        function run(cell) {
            const tbl = cell.closest('table');
            const eR = tbl.querySelector('.row-expect');
            const aR = tbl.querySelector('.row-actual');
            const dR = tbl.querySelector('.row-diff');

            const eIns = Array.from(eR.querySelectorAll('.in-cell'));
            const aIns = Array.from(aR.querySelectorAll('.in-cell'));
            const dOuts = Array.from(dR.querySelectorAll('td:not(.plan-cell)'));

            eIns.forEach((input, idx) => {
                let eT = input.innerText.trim();
                let aT = aIns[idx].innerText.trim();
                let eV = parseFloat(eT.replace(/[,%]/g, ''));
                let aV = parseFloat(aT.replace(/[,%]/g, ''));

                if (!isNaN(eV) || !isNaN(aV)) {
                    let res = (eV || 0) - (aV || 0);
                    let sfx = (eT.includes('%') || aT.includes('%')) ? '%' : '';
                    dOuts[idx].innerText = (eT === "" && aT === "") ? "" : res + sfx;
                } else {
                    dOuts[idx].innerText = "";
                }
            });
        }
    </script>
</div>

</body>
</html>
