<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>週評鑑統計表_最終精確版</title>
    <style>
        body {
            font-family: 'Microsoft JhengHei', sans-serif;
            background-color: #444;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        /* A4 紙張比例設定 */
        .a4-page {
            width: 210mm;
            height: 297mm;
            padding: 10mm 8mm;
            background-color: #fff;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 15px rgba(0,0,0,0.3);
        }

        h1 {
            text-align: center;
            color: #2e7d32;
            margin: 0 0 8px 0;
            font-size: 18pt;
        }

        .week-info {
            text-align: center;
            margin-bottom: 12px;
            font-size: 12pt;
        }

        .week-info input {
            border: none;
            border-bottom: 1px solid #333;
            width: 45px;
            text-align: center;
            font-size: 14pt;
            outline: none;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 10px; /* 8人版面間距調優 */
            table-layout: fixed;
        }

        th, td {
            border: 1px solid #2e7d32;
            text-align: center;
            padding: 5px 1px;
            word-wrap: break-word;
            line-height: 1.2;
        }

        /* 標題列：深綠底白字 */
        thead th {
            background-color: #2e7d32;
            color: white;
            font-size: 8.5pt; /* 稍微縮小以容納兩排文字 */
            height: 42px;
            font-weight: bold;
        }

        .name-header, .name-cell { width: 38px; }
        .plan-header, .plan-cell { width: 85px; font-weight: bold; font-size: 9.5pt; }

        /* 填寫區字型 14pt */
        td[contenteditable="true"] {
            cursor: text;
            font-size: 14pt;
            outline: none;
        }

        /* 配色層次設定 */
        .row-expect { background-color: #ffffff; color: #333; }
        .row-expect .plan-cell { color: #2e7d32; background-color: #fff; }

        .row-actual { 
            background-color: #e8f5e9; /* 非常淡的綠色 (比差額淺) */
            color: #8B4513; /* 咖啡色文字 */
        }

        .row-diff { 
            background-color: #c8e6c9; /* 淡綠色 (較深) */
            color: #d32f2f; /* 紅色文字 */
            font-weight: bold;
        }

        .row-diff td:not(.plan-cell) { cursor: not-allowed; }

        @media print {
            body { background: none; padding: 0; }
            .a4-page { box-shadow: none; margin: 0; }
        }
    </style>
</head>
<body>

<div class="a4-page">
    <h1>週評鑑統計表</h1>
    
    <div class="week-info">
        <input type="text" placeholder="___"> 月 第 <input type="text" placeholder="___"> 週
    </div>

    <div id="app"></div>

    <script>
        const app = document.getElementById('app');
        
        // 生成 8 個人員區塊
        for (let i = 1; i <= 8; i++) {
            const tableHTML = `
                <table>
                    <thead>
                        <tr>
                            <th class="name-header">姓名</th>
                            <th class="plan-header">計畫</th>
                            <th>參訓率<br>(8:30前)</th>
                            <th>問卷</th>
                            <th>拜訪量</th>
                            <th>FYC<br>合計</th>
                            <th>FYP<br>合計</th>
                            <th>建議書</th>
                            <th>轉介</th>
                            <th>增員<br>人次</th>
                            <th>講座<br>邀約</th>
                            <th>收入目標<br>(/月)</th>
                            <th>件數<br>(/月)</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr class="row-expect">
                            <td class="name-cell" rowspan="3" contenteditable="true"></td>
                            <td class="plan-cell">預計安排</td>
                            ${'<td contenteditable="true" class="input-cell" oninput="doCalc(this)"></td>'.repeat(11)}
                        </tr>
                        <tr class="row-actual">
                            <td class="plan-cell">實際達成</td>
                            ${'<td contenteditable="true" class="input-cell" oninput="doCalc(this)"></td>'.repeat(11)}
                        </tr>
                        <tr class="row-diff">
                            <td class="plan-cell">差額</td>
                            ${'<td></td>'.repeat(11)}
                        </tr>
                    </tbody>
                </table>
            `;
            app.insertAdjacentHTML('beforeend', tableHTML);
        }

        function doCalc(cell) {
            const table = cell.closest('table');
            const rowE = table.querySelector('.row-expect');
            const rowA = table.querySelector('.row-actual');
            const rowD = table.querySelector('.row-diff');

            const cellsE = Array.from(rowE.querySelectorAll('.input-cell'));
            const cellsA = Array.from(rowA.querySelectorAll('.input-cell'));
            const cellsD = Array.from(rowD.querySelectorAll('td:not(.plan-cell)'));

            cellsE.forEach((eCell, idx) => {
                const aCell = cellsA[idx];
                const dCell = cellsD[idx];

                let eValStr = eCell.innerText.trim();
                let aValStr = aCell.innerText.trim();
                
                let eV = parseFloat(eValStr.replace(/[,%]/g, ''));
                let aV = parseFloat(aValStr.replace(/[,%]/g, ''));

                if (!isNaN(eV) || !isNaN(aV)) {
                    let diff = (eV || 0) - (aV || 0);
                    let suffix = (eValStr.includes('%') || aValStr.includes('%')) ? '%' : '';
                    dCell.innerText = (eValStr === "" && aValStr === "") ? "" : diff + suffix;
                } else {
                    dCell.innerText = "";
                }
            });
        }
    </script>
</div>

</body>
</html>
