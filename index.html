<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>週評鑑統計表_A4最終版</title>
    <style>
        /* 基礎設定 */
        body {
            font-family: 'Microsoft JhengHei', sans-serif;
            background-color: #f0f0f0;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        /* A4 紙張容器設定 */
        .a4-container {
            width: 210mm; /* A4 標準寬度 */
            min-height: 297mm;
            padding: 15mm;
            margin: 0 auto;
            background-color: #fff;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            box-sizing: border-box;
        }

        h1 {
            text-align: center;
            color: #2e7d32;
            margin-top: 0;
            margin-bottom: 15px;
        }

        .week-info {
            text-align: center;
            margin-bottom: 20px;
            font-size: 1.1em;
        }

        .week-info input {
            border: none;
            border-bottom: 1px solid #333;
            width: 50px;
            text-align: center;
            font-size: 14pt;
            outline: none;
        }

        /* 表格樣式 */
        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 30px;
            table-layout: fixed;
            page-break-inside: avoid; /* 防止列印時表格被切斷 */
        }

        th, td {
            border: 1px solid #2e7d32;
            text-align: center;
            padding: 8px 4px;
            word-wrap: break-word;
            line-height: 1.2;
        }

        /* 標題列：深綠色地圖 */
        thead th {
            background-color: #2e7d32;
            color: white;
            font-size: 10pt; /* A4 寬度限制下，縮小一點標題字型 */
            height: 40px;
        }

        .name-header, .name-cell { width: 45px; }
        .plan-header, .plan-cell { width: 95px; font-weight: bold; }

        /* 輸入字型大小 */
        td[contenteditable="true"] {
            cursor: text;
            font-size: 14pt;
            outline: none;
        }

        /* 第一列：預計安排 (白色) */
        .row-expect {
            background-color: #ffffff;
            color: #333;
        }
        .row-expect .plan-cell { background-color: #ffffff; color: #2e7d32; }

        /* 第二列：實際達成 (中淡綠，比差額淺) */
        .row-actual {
            background-color: #e8f5e9; /* 加深的淡綠色 */
            color: #8B4513; /* 咖啡色文字 */
        }

        /* 第三列：差額 (中綠色，最深) */
        .row-diff {
            background-color: #c8e6c9; /* 最深的綠色背景 */
            color: #d32f2f; /* 紅色文字 */
            font-weight: bold;
        }

        /* 禁止編輯差額欄位 */
        .row-diff td:not(.plan-cell) {
            cursor: not-allowed;
        }

        /* 列印優化 */
        @media print {
            body { background: none; padding: 0; }
            .a4-container { box-shadow: none; margin: 0; width: 100%; }
            .no-print { display: none; }
        }
    </style>
</head>
<body>

<div class="a4-container">
    <h1>週評鑑統計表</h1>
    
    <div class="week-info">
        <input type="text" placeholder="___"> 月 第 <input type="text" placeholder="___"> 週
    </div>

    <div id="tables-content"></div>

    <script>
        const content = document.getElementById('tables-content');
        
        for (let i = 1; i <= 10; i++) {
            const tableHTML = `
                <table>
                    <thead>
                        <tr>
                            <th class="name-header">姓名</th>
                            <th class="plan-header">計畫</th>
                            <th>參訓率<br>(8:30前)</th>
                            <th>問卷</th>
                            <th>拜訪量</th>
                            <th>FYC<br>合計</th>
                            <th>FYP<br>合計</th>
                            <th>建議書</th>
                            <th>轉介</th>
                            <th>增員<br>人次</th>
                            <th>講座<br>邀約</th>
                            <th>收入目標<br>(/月)</th>
                            <th>件數<br>(/月)</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr class="row-expect">
                            <td class="name-cell" rowspan="3" contenteditable="true"></td>
                            <td class="plan-cell">預計安排</td>
                            ${'<td contenteditable="true" class="input-cell" oninput="calc(this)"></td>'.repeat(11)}
                        </tr>
                        <tr class="row-actual">
                            <td class="plan-cell">實際達成</td>
                            ${'<td contenteditable="true" class="input-cell" oninput="calc(this)"></td>'.repeat(11)}
                        </tr>
                        <tr class="row-diff">
                            <td class="plan-cell">差額</td>
                            ${'<td></td>'.repeat(11)}
                        </tr>
                    </tbody>
                </table>
            `;
            content.insertAdjacentHTML('beforeend', tableHTML);
        }

        function calc(cell) {
            const table = cell.closest('table');
            const eRow = table.querySelector('.row-expect');
            const aRow = table.querySelector('.row-actual');
            const dRow = table.querySelector('.row-diff');

            const eInputs = Array.from(eRow.querySelectorAll('.input-cell'));
            const aInputs = Array.from(aRow.querySelectorAll('.input-cell'));
            const dOutputs = Array.from(dRow.querySelectorAll('td:not(.plan-cell)'));

            eInputs.forEach((input, index) => {
                let eTxt = input.innerText.trim();
                let aTxt = aInputs[index].innerText.trim();
                
                let eVal = parseFloat(eTxt.replace(/[,%]/g, ''));
                let aVal = parseFloat(aTxt.replace(/[,%]/g, ''));

                if (!isNaN(eVal) || !isNaN(aVal)) {
                    let res = (eVal || 0) - (aVal || 0);
                    let suffix = (eTxt.includes('%') || aTxt.includes('%')) ? '%' : '';
                    dOutputs[index].innerText = (eTxt === "" && aTxt === "") ? "" : res + suffix;
                } else {
                    dOutputs[index].innerText = "";
                }
            });
        }
    </script>
</div>

</body>
</html>
