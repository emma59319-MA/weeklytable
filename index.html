<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>週評鑑統計表_8人專業版</title>
    <style>
        body {
            font-family: 'Microsoft JhengHei', sans-serif;
            background-color: #444;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
        }

        /* A4 紙張比例設定 (9:16 視覺) */
        .a4-page {
            width: 210mm;
            height: 297mm;
            padding: 12mm 10mm;
            background-color: #fff;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        h1 {
            text-align: center;
            color: #2e7d32;
            margin: 0 0 10px 0;
            font-size: 20pt;
        }

        .week-info {
            text-align: center;
            margin-bottom: 15px;
            font-size: 13pt;
        }

        .week-info input {
            border: none;
            border-bottom: 1px solid #333;
            width: 50px;
            text-align: center;
            font-size: 14pt;
            outline: none;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 12px;
            table-layout: fixed;
        }

        th, td {
            border: 1px solid #2e7d32;
            text-align: center;
            padding: 6px 2px;
            word-wrap: break-word;
            line-height: 1.2;
        }

        /* 標題列：全排深綠色底，白字 */
        thead th {
            background-color: #2e7d32;
            color: white;
            font-size: 9pt; /* 縮小標題文字 */
            height: 42px;
            font-weight: bold;
        }

        .name-header, .name-cell { width: 45px; }
        .plan-header, .plan-cell { width: 100px; font-weight: bold; font-size: 10pt; }

        /* 輸入區域：14pt */
        td[contenteditable="true"] {
            cursor: text;
            font-size: 14pt;
            outline: none;
        }

        /* 列背景與文字顏色設定 */
        .row-expect { background-color: #ffffff; color: #333; }
        
        .row-actual { 
            background-color: #e8f5e9; /* 加深的淡綠色 */
            color: #8B4513; /* 咖啡色文字 */
        }

        .row-diff { 
            background-color: #c8e6c9; /* 差額列最深綠背景 */
            color: #d32f2f; /* 紅色文字 */
            font-weight: bold;
        }

        /* 差額列禁止編輯 */
        .row-diff td:not(.plan-cell) { cursor: not-allowed; }

        @media print {
            body { background: none; }
            .a4-page { box-shadow: none; margin: 0; }
        }
    </style>
</head>
<body>

<div class="a4-page">
    <h1>週評鑑統計表</h1>
    
    <div class="week-info">
        <input type="text" placeholder="___"> 月 第 <input type="text" placeholder="___"> 週
    </div>

    <div id="table-container"></div>

    <script>
        const container = document.getElementById('table-container');
        
        // 生成 8 個人員的評鑑表
        for (let i = 1; i <= 8; i++) {
            const tableHTML = `
                <table>
                    <thead>
                        <tr>
                            <th class="name-header">姓名</th>
                            <th class="plan-header">計畫</th>
                            <th>參訓率<br>(8:30前)</th>
                            <th>問卷</th>
                            <th>拜訪量</th>
                            <th>FYC<br>合計</th>
                            <th>FYP<br>合計</th>
                            <th>建議書</th>
                            <th>轉介</th>
                            <th>增員<br>人次</th>
                            <th>講座<br>邀約</th>
                            <th>收入目標<br>(/月)</th>
                            <th>件數<br>(/月)</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr class="row-expect">
                            <td class="name-cell" rowspan="3" contenteditable="true"></td>
                            <td class="plan-cell">預計安排</td>
                            ${'<td contenteditable="true" class="input-cell" oninput="calc(this)"></td>'.repeat(11)}
                        </tr>
                        <tr class="row-actual">
                            <td class="plan-cell">實際達成</td>
                            ${'<td contenteditable="true" class="input-cell" oninput="calc(this)"></td>'.repeat(11)}
                        </tr>
                        <tr class="row-diff">
                            <td class="plan-cell">差額</td>
                            ${'<td></td>'.repeat(11)}
                        </tr>
                    </tbody>
                </table>
            `;
            container.insertAdjacentHTML('beforeend', tableHTML);
        }

        // 自動計算函數 (預計 - 實際 = 差額)
        function calc(cell) {
            const tbl = cell.closest('table');
            const rowE = tbl.querySelector('.row-expect');
            const rowA = tbl.querySelector('.row-actual');
            const rowD = tbl.querySelector('.row-diff');

            const eIns = Array.from(rowE.querySelectorAll('.input-cell'));
            const aIns = Array.from(rowA.querySelectorAll('.input-cell'));
            const dOuts = Array.from(rowD.querySelectorAll('td:not(.plan-cell)'));

            eIns.forEach((input, idx) => {
                let eT = input.innerText.trim();
                let aT = aIns[idx].innerText.trim();
                let eV = parseFloat(eT.replace(/[,%]/g, ''));
                let aV = parseFloat(aT.replace(/[,%]/g, ''));

                if (!isNaN(eV) || !isNaN(aV)) {
                    let res = (eV || 0) - (aV || 0);
                    let sfx = (eT.includes('%') || aT.includes('%')) ? '%' : '';
                    dOuts[idx].innerText = (eT === "" && aT === "") ? "" : res + sfx;
                } else {
                    dOuts[idx].innerText = "";
                }
            });
        }
    </script>
</div>

</body>
</html>
