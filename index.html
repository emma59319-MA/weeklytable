<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>週評鑑統計表_專業版</title>
    <style>
        body {
            font-family: 'Microsoft JhengHei', sans-serif;
            background-color: #f4f7f4;
            padding: 20px;
            color: #333;
        }
        .container {
            max-width: 1500px;
            margin: 0 auto;
            background-color: #fff;
            padding: 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            border-radius: 8px;
        }
        h1 {
            text-align: center;
            color: #2e7d32;
            margin-bottom: 20px;
        }
        .week-input {
            text-align: center;
            margin-bottom: 30px;
            font-size: 1.2em;
        }
        .week-input input {
            padding: 8px;
            border: none;
            border-bottom: 2px solid #2e7d32;
            width: 60px;
            text-align: center;
            font-size: 14pt;
            outline: none;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 50px;
            table-layout: fixed;
        }
        /* 一般單元格邊框為綠色 */
        th, td {
            border: 1px solid #2e7d32;
            text-align: center;
            padding: 12px 5px;
            word-wrap: break-word;
        }
        /* 修正：標題列使用白色邊框將欄位分開 */
        thead tr th {
            background-color: #2e7d32;
            color: white;
            font-weight: bold;
            font-size: 10pt;
            height: 50px;
            border: 1px solid white; 
        }
        .name-header, .name-cell { width: 60px; }
        .plan-header, .plan-cell { width: 140px; font-weight: bold; }

        /* 輸入字型大小 14pt */
        td[contenteditable="true"] {
            cursor: text;
            font-size: 14pt;
            outline: none;
        }
        td[contenteditable="true"]:focus {
            background-color: #fffde7;
        }

        /* 預計安排：白色 */
        .row-expect { background-color: #ffffff; color: #333; }
        .row-expect .plan-cell { color: #2e7d32; }

        /* 實際達成：淡綠色背景，咖啡色字 */
        .row-actual { 
            background-color: #e8f5e9; 
            color: #8B4513; 
        }

        /* 差額：中綠色背景，紅色字 */
        .row-diff { 
            background-color: #c8e6c9; 
            color: #d32f2f; 
            font-weight: bold;
        }

        .row-diff td:not(.plan-cell) { cursor: not-allowed; }
    </style>
</head>
<body>

<div class="container">
    <h1>週評鑑統計表</h1>
    
    <div class="week-input">
        <input type="text" placeholder="____"> 月 第 <input type="text" placeholder="____"> 週
    </div>

    <div id="table-app"></div>

    <script>
        const app = document.getElementById('table-app');
        
        // 生成 10 個人員的表格
        for (let i = 1; i <= 10; i++) {
            const tableHTML = `
                <table>
                    <thead>
                        <tr>
                            <th class="name-header">姓名</th>
                            <th class="plan-header">計畫</th>
                            <th>參訓率<br>(8:30前)</th>
                            <th>問卷</th>
                            <th>拜訪量</th>
                            <th>FYC<br>合計</th>
                            <th>FYP<br>合計</th>
                            <th>建議書</th>
                            <th>轉介</th>
                            <th>增員<br>人次</th>
                            <th>講座<br>邀約</th>
                            <th>收入目標<br>(/月)</th>
                            <th>件數<br>(/月)</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr class="row-expect">
                            <td class="name-cell" rowspan="3" contenteditable="true"></td>
                            <td class="plan-cell">預計安排</td>
                            ${'<td contenteditable="true" class="cell-in" oninput="doCalc(this)"></td>'.repeat(11)}
                        </tr>
                        <tr class="row-actual">
                            <td class="plan-cell">實際達成</td>
                            ${'<td contenteditable="true" class="cell-in" oninput="doCalc(this)"></td>'.repeat(11)}
                        </tr>
                        <tr class="row-diff">
                            <td class="plan-cell">差額</td>
                            ${'<td></td>'.repeat(11)}
                        </tr>
                    </tbody>
                </table>
            `;
            app.insertAdjacentHTML('beforeend', tableHTML);
        }

        function doCalc(cell) {
            const tbl = cell.closest('table');
            const rE = tbl.querySelector('.row-expect');
            const rA = tbl.querySelector('.row-actual');
            const rD = tbl.querySelector('.row-diff');

            const inE = Array.from(rE.querySelectorAll('.cell-in'));
            const inA = Array.from(rA.querySelectorAll('.cell-in'));
            const outD = Array.from(rD.querySelectorAll('td:not(.plan-cell)'));

            inE.forEach((eCell, idx) => {
                let eStr = eCell.innerText.trim();
                let aStr = inA[idx].innerText.trim();
                
                let eV = parseFloat(eStr.replace(/[,%]/g, ''));
                let aV = parseFloat(aStr.replace(/[,%]/g, ''));

                if (!isNaN(eV) || !isNaN(aV)) {
                    let diff = (eV || 0) - (aV || 0);
                    let suffix = (eStr.includes('%') || aStr.includes('%')) ? '%' : '';
                    outD[idx].innerText = (eStr === "" && aStr === "") ? "" : diff + suffix;
                } else {
                    outD[idx].innerText = "";
                }
            });
        }
    </script>
</div>

</body>
</html>
